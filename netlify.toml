[build]
  command = "npm run build"
  publish = "dist"

# Same-origin proxy: requests to /cd/* are forwarded server-side to the
# Champion Data match centre, sidestepping browser CORS. Set the build
# env var VITE_API_BASE = "/cd" so the app calls the proxy.
[[redirects]]
  from = "/cd/*"
  to = "https://mc.championdata.com/:splat"
  status = 200
  force = true
